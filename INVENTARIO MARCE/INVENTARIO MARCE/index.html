<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Inventario</title>
</head>

<body>
  <h1>Sistema de Inventario</h1>

  <section class="card" style="position: relative;">

    <img id="imagen-producto" src="" alt="Producto"
      style="position:absolute; top:15px; right:15px; width:80px; height:80px;
             object-fit:cover; border-radius:8px; border:2px solid #fff;
             box-shadow:0 2px 6px rgba(0,0,0,0.3); display:none;" />

    <h3>PRODUCTOS</h3>

    <section class="form-grid">
      <label for="nombre">Nombre:</label>
      <select id="nombre">
        <option value="">-- Seleccionar --</option>
      </select>
      <section></section>

      <label for="cantidad">Cantidad:</label>
      <input type="number" id="cantidad" />
      <button id="btnAgregar" class="btn-form">Agregar</button>

      <label for="precio">Precio unitario:</label>
      <input type="number" id="precio" />
      <section></section>
    </section>
  </section>

  <section class="card">
    <h3>Inventario</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section class="total" id="totalGeneral">Total general: $0</section>
  </section>

  <script src="inventario.js" defer></script>

</body>
</html>
